{% extends 'base.html' %}
{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-primary">
                    <div class="card-header bg-primary text-white">
                        <h2 class="mb-3">Réinitialisation du mot de passe</h2>
                    </div>
                    <div class="card-body">
                        <form method="post" action="{% url 'reset_password_email' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="email" class="form-label">Entrez votre adresse e-mail</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <button class="btn btn-primary btn-block mt-3" type="submit">Envoyer le lien de réinitialisation</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
