{%load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion</title>
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
</head>
<body>
	<div class="container" style="margin-top:50px;">
		<div class="row">
			<div class="col-md-9 col-lg-6">
				<form class="form" method="POST" action="{% url 'rest_login' %}">
					{% csrf_token %}
					<h2 class="text-primary">SIGN-IN</h2>

					<label class="form-label" for="username">Username</label>
					<input class="form-control" type="text" id="username" name="username"required>

					<label class="form-label" for="password">Password</label>
					<input class="form-control" type="text" id="password" name="password" required>

					<input class="btn btn-success" style="margin-top:10px;" type="submit" value="Login">
				</form>
			</div>
		</div>
	</div>
	<script src="{% static 'bootstrap.bundle.js' %}" type="text/javascript"></script>
</body>
</html>
