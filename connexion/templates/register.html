{% extends 'main.html' %}

{% block content %}
    <h2>Inscription</h2>
    <form class="form" method="POST" action="http://localhost:8000/rest-auth/registration/">
        {% csrf_token %}
        
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username" required>

        <label class="form-label" for="email">Email</label>
        <input class="form-control" type="email" id="email" name="email" required>

        <label class="form-label" for="password1">Password</label>
        <input class="form-control" type="password" id="password1" name="password1" required>

        <label class="form-label" for="password2">Confirm Password</label>
        <input class="form-control" type="password" id="password2" name="password2" required>

        <input class="btn btn-primary" style="margin:10px;" type="submit" value="Register">
    </form>
{% endblock %}
